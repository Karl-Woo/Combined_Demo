<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Clover Combined Demo</title>
<link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="stage">

    <!-- ──────────────── Step 1: AI-led Discovery ──────────────── -->
    <section class="screen intro" data-screen="intro-1" data-action="start" role="button" tabindex="0" aria-label="Start Clover AI-led Discovery demo">
      <img class="intro-lines" src="assets/icons/intro-lines.svg" alt="" aria-hidden="true" />
      <img class="intro-logo" src="assets/icons/clover-logo.svg" alt="Clover" />
      <h1 class="intro-title">
        <span class="intro-title-brand">Clover</span>
        <span class="intro-title-product">AI-led Discovery</span>
      </h1>
    </section>

    <section class="screen demo" data-screen="demo-1">
      <iframe class="demo-frame" data-src="demos/agentic-commerce/index.html" title="AI-led Discovery"></iframe>
    </section>

    <!-- ──────────────── Step 2: Agent Assistant ──────────────── -->
    <section class="screen intro" data-screen="intro-2" data-action="start" role="button" tabindex="0" aria-label="Start Clover Agent Assistant demo">
      <img class="intro-lines" src="assets/icons/intro-lines.svg" alt="" aria-hidden="true" />
      <img class="intro-logo" src="assets/icons/clover-logo.svg" alt="Clover" />
      <h1 class="intro-title">
        <span class="intro-title-brand">Clover</span>
        <span class="intro-title-product">Agent Assistant</span>
      </h1>
    </section>

    <section class="screen demo" data-screen="demo-2">
      <iframe class="demo-frame" data-src="demos/agent-assistant/index.html" title="Agent Assistant"></iframe>
    </section>

    <!-- ──────────────── Step 3: Agent Boarding ──────────────── -->
    <section class="screen intro" data-screen="intro-3" data-action="start" role="button" tabindex="0" aria-label="Start Clover Agent Boarding demo">
      <img class="intro-lines" src="assets/icons/intro-lines.svg" alt="" aria-hidden="true" />
      <img class="intro-logo" src="assets/icons/clover-logo.svg" alt="Clover" />
      <h1 class="intro-title">
        <span class="intro-title-brand">Clover</span>
        <span class="intro-title-product">Agent Boarding</span>
      </h1>
    </section>

    <section class="screen demo" data-screen="demo-3">
      <iframe class="demo-frame" data-src="demos/agent-boarding/dist/index.html" title="Agent Boarding" allow="autoplay"></iframe>
    </section>

    <!-- ──────────────── End screen ──────────────── -->
    <section class="screen intro end" data-screen="end">
      <img class="end-logo" src="assets/icons/clover-logo.svg" alt="Clover" />
    </section>

    <!-- ──────────────── Next pill ──────────────── -->
    <!-- The button is the only pointer-receiving overlay; reveal is
         driven by JS that listens for mousemove inside each iframe
         (same-origin) so we never have to put a hit-target over the
         demo content. -->
    <button class="next-overlay" id="nextOverlay" aria-label="Next demo">
      <span class="next-label">Next</span>
      <svg class="next-arrow" viewBox="0 0 24 24" aria-hidden="true">
        <path d="M5 12h14M13 6l6 6-6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      </svg>
    </button>

  </main>

  <script src="app.js"></script>
</body>
</html>
