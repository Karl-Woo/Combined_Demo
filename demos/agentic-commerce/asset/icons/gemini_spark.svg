<svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Light purple (top-right) → vivid blue (bottom-left). Matches
         the reference: most of the body reads as saturated blue with
         a lavender wash on the upper-right corner. -->
    <linearGradient id="gemini-spark-grad" x1="22" y1="2" x2="6" y2="22" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#B89BFF"/>
      <stop offset="35%"  stop-color="#5573FF"/>
      <stop offset="100%" stop-color="#1F5DFF"/>
    </linearGradient>
  </defs>
  <!-- 4-cusp sparkle. Quadratic Béziers with the control point at the
       center (12,12) produce maximally sharp cusps at each tip and a
       smooth concave bulge along each side — closer to the Gemini
       astroid shape than the softer cubic version. -->
  <path d="M 12 0 Q 12 12 24 12 Q 12 12 12 24 Q 12 12 0 12 Q 12 12 12 0 Z"
        fill="url(#gemini-spark-grad)"/>
</svg>
